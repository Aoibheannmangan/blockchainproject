<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/gh/ethereum/web3.js/dist/web3.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="contract.js"></script>
    <link rel="stylesheet" href="styles.css">
    <title>Blockchain Project - Balances</title>
</head>
<body>
    <nav class="main-nav">
        <span class="brand">Blockchain Project - Aoibhean!!</span>
        <div class="nav-actions">
            <button class="nav-btn" onclick="window.location.href='index.html'">Create</button>
            <button class="nav-btn active" onclick="window.location.href='balances.html'">Balances</button>
            <button class="nav-btn" onclick="window.location.href='buy.html'">Buy</button>
            <button class="nav-btn" onclick="window.location.href='transfer.html'">Transfer</button>
        </div>
    </nav>

    <main>
        <section class="page-section active">
            <h2>Balances</h2>
            <div class="info">
                <p>ETH Balance: <span id="ethBalance">-</span></p>
                <p>Ticket Token Balance: <span id="ticketBalance">-</span></p>
            </div>
            <button id="refreshBalancesBtn">Refresh Balances</button>
        </section>
    </main>

    <div id="errorModal" class="modal">
        <div class="modal-content">
            <span id="closeModal" class="close">&times;</span>
            <p id="errorMessage"></p>
        </div>
    </div>

<script>
    $(document).ready(async function() {
        await connectMetaMask();

        $("#refreshBalancesBtn").click(async function() {
            if (!web3 || !account) {
                const connected = await connectMetaMask();
                if (!connected) return;
            }
            try {
                const ethBal = await web3.eth.getBalance(account);
                $("#ethBalance").text(web3.utils.fromWei(ethBal, 'ether'));
                const ticketBal = await contract.methods.balanceOf(account).call();
                $("#ticketBalance").text(web3.utils.fromWei(ticketBal, 'ether'));
            } catch (err) {
                showError('Error fetching balances: ' + err.message);
            }
        });

        $("#closeModal").click(function() {
            $("#errorModal").css("display", "none");
        });
    });
</script>
</body>
</html>
