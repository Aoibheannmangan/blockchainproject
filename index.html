<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/gh/ethereum/web3.js/dist/web3.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="contract.js"></script>
    <link rel="stylesheet" href="styles.css">
    <title>Blockchain Project - Create Wallet</title>
</head>
<body>
    <nav class="main-nav">
        <span class="brand">Blockchain Project - Aoibhean!!</span>
        <div class="nav-actions">
            <button class="nav-btn active" onclick="window.location.href='index.html'">Create</button>
            <button class="nav-btn" onclick="window.location.href='balances.html'">Balances</button>
            <button class="nav-btn" onclick="window.location.href='buy.html'">Buy</button>
            <button class="nav-btn" onclick="window.location.href='transfer.html'">Transfer</button>
        </div>
    </nav>

    <main>
        <section class="page-section active">
            <h2>Create Wallet</h2>
            <button id="createWalletBtn">Create Wallet</button>
            <input type="password" id="walletPassword" placeholder="Enter a password for the Keystore">
            <br/><br/>
            <label for="walletAddress">Wallet Address:</label>
            <textarea id="walletAddress" rows="2"></textarea>
            <label for="privateKey">Private Key:</label>
            <textarea id="privateKey" rows="2"></textarea>
            <label for="keystoreField">Keystore File:</label>
            <textarea id="keystoreField" rows="4"></textarea>
            <br/><br/>
            <a class="btn" id="downloadKeystoreBtn">Download Keystore</a>
        </section>
    </main>

    <div id="errorModal" class="modal">
        <div class="modal-content">
            <span id="closeModal" class="close">&times;</span>
            <p id="errorMessage"></p>
        </div>
    </div>

<script>
    $(document).ready(function() {
        $("#createWalletBtn").click(function() {
            const password = $("#walletPassword").val();
            if (password === "") {
                showError("Please enter a password for the Keystore.");
                return;
            }
            const localWeb3 = new Web3();
            const wallet = localWeb3.eth.accounts.create();
            $("#walletAddress").val(wallet.address);
            $("#privateKey").val(wallet.privateKey);
            const keystore = localWeb3.eth.accounts.encrypt(wallet.privateKey, password);
            $("#keystoreField").val(JSON.stringify(keystore, null, 2));
        });

        $("#downloadKeystoreBtn").click(function() {
            const keystore = $("#keystoreField").val();
            if (!keystore) {
                showError('Create a wallet first.');
                return;
            }
            const walletAddr = $("#walletAddress").val();
            const blob = new Blob([keystore], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = walletAddr + '.json';
            a.click();
        });

        $("#closeModal").click(function() {
            $("#errorModal").css("display", "none");
        });
    });
</script>
</body>
</html>
